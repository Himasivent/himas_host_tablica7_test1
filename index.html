<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnionTeams - Admin Panel</title>
    <!-- Подключаем иконки и шрифт как на оригинале -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f1011;
            --card-bg: #151719;
            --sidebar-bg: #151719;
            --text-color: #ececec;
            --text-muted: #8a8d90;
            --accent-blue: #007bff;
            --border-color: #24272a;
            --danger-red: #dc3545;
            --success-green: #28a745;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Боковое меню */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 0 25px 30px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        .nav-item {
            padding: 12px 25px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            padding: 30px 40px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title { margin: 0; font-size: 22px; font-weight: 600; }

        /* Стили авторизации */
        .login-zone {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        /* Таблица */
        .content-card {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255,255,255,0.02);
            text-align: left;
            padding: 15px 20px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .steam-link { color: var(--accent-blue); text-decoration: none; }
        .role-badge {
            background: rgba(255,255,255,0.08);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Кнопки и формы */
        input {
            background: #0b0c0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            outline: none;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-blue { background: var(--accent-blue); color: white; }
        .btn-red { background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); }
        .btn-red:hover { background: var(--danger-red); color: white; }

        .admin-controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 15px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .hidden { display: none !important; }
        .user-tag { color: var(--success-green); font-weight: 600; }
    </style>
</head>
<body>

    <!-- Сайдбар как на Union -->
    <div class="sidebar">
        <div class="logo">UNION<span style="color: var(--accent-blue);">TEAMS</span></div>
        <a href="#" class="nav-item active"><i class="fas fa-users"></i> Участники</a>
        <a href="#" class="nav-item"><i class="fas fa-calendar-alt"></i> Ивенты</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Статистика</a>
        <a href="#" class="nav-item"><i class="fas fa-cog"></i> Настройки</a>
    </div>

    <!-- Основная часть -->
    <div class="main-content">
        <div class="header-top">
            <h1 class="page-title">Участники Ивент Отдела</h1>
            
            <div class="login-zone" id="login-area">
                <input type="text" id="username" placeholder="Ваше имя">
                <button class="btn btn-blue" onclick="auth()">Войти</button>
            </div>

            <div class="login-zone hidden" id="user-area">
                <span>Добро пожаловать, <span class="user-tag" id="display-name"></span></span>
            </div>
        </div>

        <div class="content-card">
            <table>
                <thead>
                    <tr>
                        <th>Никнейм</th>
                        <th>SteamID32</th>
                        <th>Должность</th>
                        <th class="adm-col hidden">Действие</th>
                    </tr>
                </thead>
                <tbody id="member-table">
                    <!-- Заполняется через JS -->
                </tbody>
            </table>
        </div>

        <!-- Панель добавления (только для Niko) -->
        <div id="add-panel" class="admin-controls hidden">
            <input type="text" id="new-nick" placeholder="Никнейм">
            <input type="text" id="new-steam" placeholder="SteamID32">
            <input type="text" id="new-role" placeholder="Должность">
            <button class="btn btn-blue" onclick="addMember()">Добавить</button>
        </div>
    </div>
        <!-- Панель добавления (Himas) -->
        <div id="add-panel" class="admin-controls hidden">
            <input type="text" id="new-nick" placeholder="Никнейм">
            <input type="text" id="new-steam" placeholder="SteamID32">
            <input type="text" id="new-role" placeholder="Должность">
            <button class="btn btn-blue" onclick="addMember()">Добавить</button>
        </div>
    </div>

    <script>
        let isLogged = false;
        let data = [
            { nick: "Niko", steam: "0:0:11223344", role: "Head of Events" },
            { nick: "Alex", steam: "0:1:55667788", role: "Game Master" }
        ];

        function render() {
            const table = document.getElementById('member-table');
            table.innerHTML = '';
            
            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #fff; font-weight: 500;">${item.nick}</td>
                    <td><a href="#" class="steam-link">${item.steam}</a></td>
                    <td><span class="role-badge">${item.role}</span></td>
                    <td class="adm-col ${isLogged ? '' : 'hidden'}">
                        <button class="btn btn-red" onclick="remove(${index})"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                table.appendChild(tr);
            });
        }

        function auth() {
            const val = document.getElementById('username').value;
            if (val.toLowerCase() === 'niko') {
                isLogged = true;
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('user-area').classList.remove('hidden');
                document.getElementById('display-name').innerText = 'Niko';
                document.getElementById('add-panel').classList.remove('hidden');
                
                // Показываем колонку действий
                document.querySelectorAll('.adm-col').forEach(el => el.classList.remove('hidden'));
                render();
            } else {
                alert("Доступ только для Niko");
            }
        }

        function auth() {
            const val = document.getElementById('username').value;
            if (val.toLowerCase() === 'himas') {
                isLogged = true;
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('user-area').classList.remove('hidden');
                document.getElementById('display-name').innerText = 'Himas';
                document.getElementById('add-panel').classList.remove('hidden');
                
                // Показываем колонку действий
                document.querySelectorAll('.adm-col').forEach(el => el.classList.remove('hidden'));
                render();
            } else {
                alert("Доступ только для Himas");
            }
        }

        function addMember() {
            const nick = document.getElementById('new-nick').value;
            const steam = document.getElementById('new-steam').value;
            const role = document.getElementById('new-role').value;

            if(nick && steam && role) {
                data.push({ nick, steam, role });
                document.getElementById('new-nick').value = '';
                document.getElementById('new-steam').value = '';
                document.getElementById('new-role').value = '';
                render();
            }
        }

        function remove(idx) {
            if(confirm("Удалить участника?")) {
                data.splice(idx, 1);
                render();
            }
        }

        // Инициализация таблицы
        render();
    </script>
</body>
</html>
